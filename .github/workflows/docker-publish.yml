name: Build and Push Docker Image

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git tags used in versioning

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set Version Info
        run: |
          V_VERSION=$(git tag --sort=-committerdate | head -n1)
          V_VERSION=${V_VERSION:-0.0.0}
          echo "V_HASH=$(echo ${{ github.sha }} | cut -c -7)" >> $GITHUB_ENV
          echo "V_VER=$V_VERSION" >> $GITHUB_ENV

      - name: Set Snapshot Suffix
        run: |
          if [[ "${{ github.event.repository.default_branch }}" != "${{ github.ref_name }}" ]]; then
            echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
          else
            V_VERSION=$(git tag --sort=-committerdate | head -n1)
            if [[ "$V_VERSION" =~ \.0$ ]]; then
              echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
            fi
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: ./gradlew dockerPushImage --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
